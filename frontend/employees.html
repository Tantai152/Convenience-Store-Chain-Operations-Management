<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - CS Chain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">CS Chain</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="branches.html">Branches</a></li>
                <li class="nav-item"><a class="nav-link" href="inventory.html">Inventory</a></li>
                <li class="nav-item"><a class="nav-link active" href="employees.html">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
            </ul>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Employee Management</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#employeeModal">
            + Add Employee
        </button>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body py-3">
            <div class="row align-items-center">
                <div class="col-md-auto">
                    <label for="filterStore" class="form-label mb-0 fw-bold">Filter by Store:</label>
                </div>
                <div class="col-md-4">
                    <select class="form-select form-select-sm" id="filterStore">
                        <option value="all">All Stores</option>
                        <option value="District 1 Store">District 1 Store</option>
                        <option value="District 3 Store">District 3 Store</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Store Branch</th>
                        <th>Shift</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    <tr>
                        <td>Thanh Chuong</td>
                        <td><span class="badge bg-secondary">Manager</span></td>
                        <td>District 1 Store</td>
                        <td>Morning</td>
                        <td><span class="badge bg-success">Active</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#employeeModal">Edit</button>
                            <button class="btn btn-sm btn-outline-danger btn-deactivate">Deactivate</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Ngoc Thach</td>
                        <td><span class="badge bg-info text-dark">Staff</span></td>
                        <td>District 3 Store</td>
                        <td>Evening</td>
                        <td><span class="badge bg-success">Active</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#employeeModal">Edit</button>
                            <button class="btn btn-sm btn-outline-danger btn-deactivate">Deactivate</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="employeeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Employee</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addEmployeeForm">
                    <div class="mb-3">
                        <label for="empName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="empName" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="empRole" class="form-label">Role</label>
                            <select class="form-select" id="empRole">
                                <option value="Manager">Manager</option>
                                <option value="Staff">Staff</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="empShift" class="form-label">Shift</label>
                            <select class="form-select" id="empShift">
                                <option value="Morning">Morning</option>
                                <option value="Afternoon">Afternoon</option>
                                <option value="Evening">Evening</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="empStore" class="form-label">Assign to Store</label>
                        <select class="form-select" id="empStore">
                            <option value="District 1 Store">District 1 Store</option>
                            <option value="District 3 Store">District 3 Store</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="addEmployeeForm" class="btn btn-primary">Save Employee</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/employees.js"></script>
</body>
</html>
